<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #e94560;
    --accent-hover: #ff6b7a;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid #ffffff0a;
    flex-shrink: 0;
    min-height: 48px;
  }

  .toolbar .logo {
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.5px;
    margin-right: 8px;
  }

  .toolbar .logo span { color: var(--text-dim); font-weight: 400; }

  .btn {
    background: var(--surface2);
    border: none;
    color: var(--text);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .btn:hover { background: #1a4a7a; }
  .btn:active { transform: scale(0.96); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-icon {
    width: 32px; height: 32px; padding: 0;
    justify-content: center;
    font-size: 16px;
    border-radius: 50%;
  }

  .spacer { flex: 1; }

  .zoom-info {
    font-size: 12px;
    color: var(--text-dim);
    min-width: 48px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .filename {
    font-size: 13px;
    color: var(--text-dim);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-input-wrapper { position: relative; }
  .file-input-wrapper input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    font-size: 0;
    width: 100%;
  }

  /* ── Drop Zone ── */
  .drop-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    color: var(--text-dim);
    transition: background 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .drop-zone.dragover {
    background: #ffffff08;
    border-color: var(--accent);
  }

  .drop-zone .placeholder-icon {
    font-size: 64px;
    opacity: 0.3;
    line-height: 1;
  }
  .drop-zone .placeholder-text {
    font-size: 18px;
    font-weight: 500;
  }
  .drop-zone .placeholder-sub {
    font-size: 13px;
    opacity: 0.6;
  }

  .drop-zone.has-image { cursor: grab; }
  .drop-zone.has-image:active { cursor: grabbing; }

  /* ── Image ── */
  .drop-zone img {
    position: absolute;
    transform-origin: 0 0;
    image-rendering: auto;
    will-change: transform;
    pointer-events: none;
    box-shadow: 0 4px 40px #00000066;
  }

  /* ── Keyboard/Mouse hints ── */
  .hints {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid #ffffff0a;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .hints.visible { opacity: 1; }
  .hints kbd {
    background: #ffffff0a;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 10px;
    border: 1px solid #ffffff14;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--surface2);
    color: var(--text);
    padding: 8px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .toolbar { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
    .filename { max-width: 120px; }
    .hints { display: none; }
  }
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="logo">Receipt<span>Viewer</span></div>

  <div class="file-input-wrapper">
    <button class="btn btn-accent">Open File</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <button class="btn" id="btnFit">Fit</button>

  <div class="spacer"></div>

  <span class="filename" id="filename"></span>

  <button class="btn btn-icon" id="btnZoomOut" title="Zoom Out (Ctrl+-)">−</button>
  <span class="zoom-info" id="zoomInfo">100%</span>
  <button class="btn btn-icon" id="btnZoomIn" title="Zoom In (Ctrl+=)">+</button>
</div>

<!-- Viewer -->
<div class="drop-zone" id="dropZone">
  <div class="placeholder" id="placeholder">
    <div class="placeholder-icon">📄</div>
    <div class="placeholder-text">Drop an image here</div>
    <div class="placeholder-sub">or click <strong>Open File</strong> above</div>
  </div>
  <img id="viewerImg" alt="" style="display:none;">
</div>

<!-- Hints -->
<div class="hints" id="hints">
  <span><kbd>Scroll</kbd> zoom</span>
  <span><kbd>Drag</kbd> pan</span>
  <span><kbd>Ctrl+0</kbd> fit</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  const img = document.getElementById('viewerImg');
  const dropZone = document.getElementById('dropZone');
  const placeholder = document.getElementById('placeholder');
  const fileInput = document.getElementById('fileInput');
  const filename = document.getElementById('filename');
  const zoomInfo = document.getElementById('zoomInfo');
  const btnZoomIn = document.getElementById('btnZoomIn');
  const btnZoomOut = document.getElementById('btnZoomOut');
  const btnFit = document.getElementById('btnFit');
  const hints = document.getElementById('hints');
  const toast = document.getElementById('toast');

  let zoom = 1;
  let panX = 0, panY = 0;
  let isDragging = false;
  let dragStartX = 0, dragStartY = 0;
  let startPanX = 0, startPanY = 0;
  let imageLoaded = false;

  const MIN_ZOOM = 0.1;
  const MAX_ZOOM = 20;
  const ZOOM_STEP = 0.1;
  const ZOOM_SNAP = [0.1, 0.25, 0.33, 0.5, 0.75, 1, 1.25, 1.5, 2, 3, 4, 5, 8, 10, 15, 20];

  // ── Toast ──
  let toastTimeout;
  function showToast(msg) {
    clearTimeout(toastTimeout);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // ── Closest snap zoom ──
  function snapZoom(z) {
    return ZOOM_SNAP.reduce((prev, curr) =>
      Math.abs(curr - z) < Math.abs(prev - z) ? curr : prev
    );
  }

  // ── Fit image to viewport ──
  function fitToScreen() {
    if (!imageLoaded) return;
    const rect = dropZone.getBoundingClientRect();
    const pad = 40;
    const availW = rect.width - pad * 2;
    const availH = rect.height - pad * 2;

    const scaleX = availW / img.naturalWidth;
    const scaleY = availH / img.naturalHeight;
    zoom = Math.min(scaleX, scaleY);
    zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom));

    panX = (rect.width - img.naturalWidth * zoom) / 2;
    panY = (rect.height - img.naturalHeight * zoom) / 2;
    applyTransform();
    showToast(`Fitted (${Math.round(zoom * 100)}%)`);
  }

  // ── Apply transform ──
  function applyTransform() {
    img.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    zoomInfo.textContent = `${Math.round(zoom * 100)}%`;
    updateCursor();
  }

  // ── Zoom at a specific point (cursor) ──
  function zoomAtPoint(newZoom, cx, cy) {
    const rect = dropZone.getBoundingClientRect();
    if (cx === undefined) {
      cx = rect.width / 2;
      cy = rect.height / 2;
    }
    // Mouse position relative to drop zone
    const mx = cx - rect.left;
    const my = cy - rect.top;
    // Where the mouse was in image space before zoom
    const imgX = (mx - panX) / zoom;
    const imgY = (my - panY) / zoom;
    // Apply new zoom
    zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newZoom));
    zoom = snapZoom(zoom);
    // Pan so the point under cursor stays
    panX = mx - imgX * zoom;
    panY = my - imgY * zoom;
    applyTransform();
  }

  function zoomIn(cx, cy) {
    const next = zoom + ZOOM_STEP * zoom;
    zoomAtPoint(next, cx, cy);
  }

  function zoomOut(cx, cy) {
    const next = zoom - ZOOM_STEP * zoom;
    zoomAtPoint(next, cx, cy);
  }

  // ── Cursor ──
  function updateCursor() {
    if (!imageLoaded) return;
    dropZone.style.cursor = zoom > 1.05 * getFitZoom() ? 'grab' : 'default';
  }

  function getFitZoom() {
    const rect = dropZone.getBoundingClientRect();
    const pad = 40;
    const scaleX = (rect.width - pad * 2) / img.naturalWidth;
    const scaleY = (rect.height - pad * 2) / img.naturalHeight;
    return Math.min(scaleX, scaleY);
  }

  // ── Load image ──
  function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      img.onload = function() {
        imageLoaded = true;
        placeholder.style.display = 'none';
        img.style.display = 'block';
        filename.textContent = file.name;
        hints.classList.add('visible');
        fitToScreen();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── Events: File picker ──
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) loadImage(fileInput.files[0]);
    fileInput.value = '';
  });

  // ── Events: Drag & Drop ──
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
  });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) loadImage(file);
  });

  // ── Events: Mouse wheel zoom ──
  dropZone.addEventListener('wheel', (e) => {
    if (!imageLoaded) {
      // Allow scrolling page if no image
      return;
    }
    e.preventDefault();
    if (e.deltaY < 0) {
      zoomIn(e.clientX, e.clientY);
    } else {
      zoomOut(e.clientX, e.clientY);
    }
  }, { passive: false });

  // ── Events: Pan (click-drag) ──
  dropZone.addEventListener('mousedown', (e) => {
    if (!imageLoaded) return;
    if (e.target === img || zoom > 1.05 * getFitZoom()) {
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startPanX = panX;
      startPanY = panY;
      dropZone.style.cursor = 'grabbing';
      e.preventDefault();
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    panX = startPanX + dx;
    panY = startPanY + dy;
    applyTransform();
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
    updateCursor();
  });

  // ── Events: Buttons ──
  btnZoomIn.addEventListener('click', () => {
    if (!imageLoaded) return showToast('Open an image first');
    const rect = dropZone.getBoundingClientRect();
    zoomIn(rect.left + rect.width / 2, rect.top + rect.height / 2);
  });
  btnZoomOut.addEventListener('click', () => {
    if (!imageLoaded) return showToast('Open an image first');
    const rect = dropZone.getBoundingClientRect();
    zoomOut(rect.left + rect.width / 2, rect.top + rect.height / 2);
  });
  btnFit.addEventListener('click', () => {
    if (!imageLoaded) return showToast('Open an image first');
    fitToScreen();
  });

  // ── Events: Keyboard ──
  document.addEventListener('keydown', (e) => {
    if (!imageLoaded) return;
    const rect = dropZone.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    if (e.ctrlKey && e.key === '=') { e.preventDefault(); zoomIn(cx, cy); }
    else if (e.ctrlKey && e.key === '-') { e.preventDefault(); zoomOut(cx, cy); }
    else if (e.ctrlKey && e.key === '0') { e.preventDefault(); fitToScreen(); }
  });

  // ── Window resize ──
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (imageLoaded) {
        // Keep zoom, reposition image to stay centered-ish
        const rect = dropZone.getBoundingClientRect();
        panX = Math.max(0, Math.min(panX, rect.width - img.naturalWidth * zoom));
        panY = Math.max(0, Math.min(panY, rect.height - img.naturalHeight * zoom));
        // Actually just refit on resize for simplicity
        fitToScreen();
      }
    }, 200);
  });

  // ── Prevent default drag on image ──
  document.addEventListener('dragstart', (e) => e.preventDefault());

  console.log('📄 Receipt Viewer ready — drop a receipt image to start.');
})();
</script>
</body>
</html>
